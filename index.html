<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正清 の 导航页</title>
    <link rel="icon" href="https://image.songzq.cn/avatar_yuan.jpg" type="image/jpeg">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="loading" id="loading">
        <div class="loading-spinner"></div>
        <p>加载中...</p>
    </div>
    
    <div class="app-container">
        <div class="front-page">
            <div class="background" id="background"></div>
            <div class="container">
                <div class="header-row">
                    <div class="time-date">
                        <div class="time" id="currentTime"></div>
                        <div class="date" id="currentDate"></div>
                        <div class="weather" id="weather"></div>
                    </div>
                    <button class="theme-toggle" id="themeToggle" title="切换主题">🌙</button>
                </div>
                
                <div class="search-container">
                    <div class="search-box">
                        <div class="search-engine" id="searchEngineBtn">
                            <img id="searchIcon" alt="搜索引擎">
                            <div class="search-engines-dropdown" id="searchEnginesDropdown"></div>
                        </div>
                        <input type="text" class="search-input" id="searchInput" placeholder="搜索... (按 / 快速聚焦)">
                        <div class="search-suggestions" id="searchSuggestions"></div>
                        <button class="search-button" id="searchButton">🔍</button>
                    </div>
                </div>
                
                <div class="category-header">
                    <div class="category-tabs" id="categoryTabs"></div>
                    <div class="website-search-box">
                        <input type="text" class="website-search-input" id="websiteSearch" placeholder="筛选网站...">
                    </div>
                </div>
                
                <div class="websites-container">
                    <div class="websites-grid" id="websitesGrid"></div>
                </div>
                
                <!-- <div class="footer">
                    <p>快捷键: / 聚焦搜索 | Alt+0-8 切换分类 | Esc 关闭弹窗</p>
                </div> -->
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
